<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروع الشاورما — ملخص الإغلاق</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #e8a020;
    --accent2: #f0c060;
    --green: #40c080;
    --blue: #5090e0;
    --red: #e05050;
    --text: #f0eee8;
    --muted: #888898;
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,160,32,0.08) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }

  /* HEADER */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(10,10,15,0.94);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex; align-items: center; gap: 14px;
  }
  .logo {
    width:42px; height:42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
    box-shadow: 0 0 18px rgba(232,160,32,0.3);
  }
  .header-info h1 { font-size:1.05rem; font-weight:800; }
  .header-info p  { font-size:0.72rem; color:var(--muted); }
  .header-date {
    margin-right:auto;
    font-size:0.75rem; color:var(--muted);
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px; padding:5px 12px;
    white-space:nowrap;
  }

  /* MAIN */
  main { position:relative; z-index:1; padding:28px 20px; max-width:900px; margin:0 auto; }

  .page-label {
    font-size:0.68rem; font-weight:700;
    letter-spacing:0.14em; color:var(--accent);
    text-transform:uppercase; margin-bottom:6px;
  }
  .page-title { font-size:1.5rem; font-weight:900; margin-bottom:4px; }
  .page-sub   { font-size:0.82rem; color:var(--muted); margin-bottom:28px; }

  /* STATS BAR */
  .stats-bar {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:12px; margin-bottom:28px;
  }
  .stat-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:14px 16px;
  }
  .stat-label { font-size:0.7rem; color:var(--muted); margin-bottom:4px; }
  .stat-val   { font-size:1.3rem; font-weight:900; }
  .stat-val.gold   { color:var(--accent); }
  .stat-val.green  { color:var(--green); }
  .stat-val.blue   { color:var(--blue); }

  /* GRID */
  .branches-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:14px;
  }

  .branch-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:22px 16px;
    cursor:pointer; text-decoration:none; color:var(--text);
    display:block; position:relative; overflow:hidden;
    transition: all 0.25s ease;
    animation: fadeUp 0.4s ease both;
  }
  .branch-card::after {
    content:'';
    position:absolute; top:0; right:0; left:0; height:3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform:scaleX(0); transition:transform 0.25s ease;
    transform-origin:right;
  }
  .branch-card:hover { border-color:var(--accent); transform:translateY(-4px); box-shadow:0 12px 35px rgba(0,0,0,0.45); }
  .branch-card:hover::after { transform:scaleX(1); }

  .branch-num {
    width:42px; height:42px;
    background: linear-gradient(135deg,rgba(232,160,32,0.15),rgba(240,192,96,0.06));
    border:1px solid rgba(232,160,32,0.25);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1rem; font-weight:900; color:var(--accent);
    margin:0 auto 14px;
  }
  .branch-name { font-size:1rem; font-weight:800; text-align:center; margin-bottom:8px; }

  .branch-meta {
    display:flex; flex-direction:column; gap:4px;
    border-top:1px solid var(--border); padding-top:10px; margin-top:4px;
  }
  .meta-row {
    display:flex; justify-content:space-between;
    font-size:0.72rem;
  }
  .meta-row .lbl { color:var(--muted); }
  .meta-row .val { font-weight:700; }
  .meta-row .val.green { color:var(--green); }
  .meta-row .val.gold  { color:var(--accent); }
  .meta-row .val.muted { color:var(--muted); }

  .open-link {
    display:flex; align-items:center; justify-content:center; gap:6px;
    margin-top:12px;
    background:rgba(232,160,32,0.1);
    border:1px solid rgba(232,160,32,0.2);
    border-radius:8px; padding:7px;
    font-size:0.75rem; font-weight:700; color:var(--accent);
    transition:all 0.2s;
  }
  .branch-card:hover .open-link { background:rgba(232,160,32,0.2); }

  /* STATUS BADGE */
  .status-badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 10px; border-radius:20px;
    font-size:0.7rem; font-weight:700;
    margin:0 auto 10px; 
  }
  .status-badge.open   { background:rgba(64,192,128,0.12); color:#40c080; border:1px solid rgba(64,192,128,0.25); }
  .status-badge.closed { background:rgba(224,80,80,0.1);   color:#e05050; border:1px solid rgba(224,80,80,0.2); }
  .badge-dot {
    width:6px; height:6px; border-radius:50%; flex-shrink:0;
  }
  .status-badge.open   .badge-dot { background:#40c080; box-shadow:0 0 5px #40c080; animation:blink 1.6s ease infinite; }
  .status-badge.closed .badge-dot { background:#e05050; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .branch-num-wrap { display:flex; flex-direction:column; align-items:center; }

  /* SKEWER ROW */
  .skewer-row {
    display:flex; align-items:center; justify-content:center; gap:6px;
    background:rgba(232,160,32,0.07); border:1px solid rgba(232,160,32,0.18);
    border-radius:8px; padding:6px 10px; margin-bottom:8px; font-size:0.75rem;
  }
  .sk-item { font-weight:800; }
  .sk-item.sk-active { color:var(--accent); }
  .sk-item.sk-next   { color:var(--blue); }
  .sk-item.sk-empty  { color:var(--muted); font-weight:400; }
  .sk-arrow { color:var(--muted); font-size:0.7rem; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="logo">🥙</div>
  <div class="header-info">
    <h1>الشاورما — إغلاق يومي</h1>
    <p>لوحة إدارة الفروع</p>
  </div>
  <div class="header-date" id="hDate"></div>
</header>

<main>
  <div class="page-label">نظرة عامة</div>
  <div class="page-title">فروعنا الـ ١٢</div>
  <div class="page-sub">اختر الفرع لعرض أو إدخال ملخص الإغلاق اليومي</div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">إجمالي الأيام المسجّلة</div>
      <div class="stat-val gold" id="statDays">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">إيرادات اليوم (كل الفروع)</div>
      <div class="stat-val green" id="statRevenue">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">عدد الفروع المُسجَّلة اليوم</div>
      <div class="stat-val blue" id="statActive">—</div>
    </div>
  </div>

  <div class="branches-grid" id="grid"></div>
</main>

<script>
const BRANCHES = [
  'فرع النرجس','فرع حطين','فرع الرمال',
  'فرع العزيزية','فرع النظيم','فرع ديراب',
  'فرع السويدي','فرع الشفا','فرع حايل',
  'فرع ينبع','فرع الحسا','فرع الدوادمي'
];

const INCOME_IDS  = ['cash','network','apps','deliver'];
const EXPENSE_IDS = ['expenses'];

function todayStr() { return new Date().toISOString().slice(0,10); }
function fmt(n) { return n.toLocaleString('ar-SA',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function allData() { return JSON.parse(localStorage.getItem('shawarma_data')||'{}'); }

function getBranchStats(name) {
  const data = allData();
  const today = todayStr();
  const keys  = Object.keys(data).filter(k=>k.startsWith(name+'__'));
  let totalDays=keys.length, todayRev=null, todayNet=null;
  const todayKey = name+'__'+today;
  if(data[todayKey]){
    let rev=0,exp=0;
    INCOME_IDS.forEach(id=>rev+=(data[todayKey][id]||0));
    EXPENSE_IDS.forEach(id=>exp+=(data[todayKey][id]||0));
    todayRev=rev; todayNet=rev-exp;
  }
  return {totalDays, todayRev, todayNet};
}

function getBranchSkewerInfo(name) {
  try {
    const d = JSON.parse(localStorage.getItem(`skewers__${name}`) || '{}');
    return { s1: d.slot1 || null, s2: d.slot2 || null };
  } catch { return { s1:null, s2:null }; }
}

const KG_AR = { 10:'١٠', 15:'١٥', 20:'٢٠' };

function getBranchStatus(name) {
  try {
    const s = JSON.parse(localStorage.getItem(`status__${name}`) || '{"isOpen":false}');
    return s.isOpen;
  } catch { return false; }
}

// Header date
document.getElementById('hDate').textContent =
  new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// Build grid
const grid = document.getElementById('grid');
BRANCHES.forEach((name,i)=>{
  const {totalDays,todayRev,todayNet} = getBranchStats(name);
  const isOpen = getBranchStatus(name);
  const { s1, s2 } = getBranchSkewerInfo(name);

  const skewerHTML = (isOpen && (s1 || s2)) ? `
    <div class="skewer-row">
      <span class="sk-item ${s1?'sk-active':'sk-empty'}">
        🔥 ${s1 ? KG_AR[s1]+' كغ' : '—'}
      </span>
      <span class="sk-arrow">←</span>
      <span class="sk-item ${s2?'sk-next':'sk-empty'}">
        ⏭ ${s2 ? KG_AR[s2]+' كغ' : '—'}
      </span>
    </div>` : '';
  const card = document.createElement('a');
  card.className = 'branch-card';
  card.href = `branch.html?id=${i+1}`;
  card.style.animationDelay = (i*0.05)+'s';

  const revHTML = todayRev !== null
    ? `<span class="val gold">${fmt(todayRev)} ر.س</span>`
    : `<span class="val muted">لم يُسجَّل</span>`;
  const netHTML = todayNet !== null
    ? `<span class="val ${todayNet>=0?'green':'red'}">${fmt(todayNet)} ر.س</span>`
    : `<span class="val muted">—</span>`;

  const statusBadge = isOpen
    ? `<div class="status-badge open"><span class="badge-dot"></span>مفتوح</div>`
    : `<div class="status-badge closed"><span class="badge-dot"></span>مغلق</div>`;

  card.innerHTML = `
    <div class="branch-num-wrap">
      <div class="branch-num">${i+1}</div>
      ${statusBadge}
    </div>
    <div class="branch-name">${name}</div>
    ${skewerHTML}
    <div class="branch-meta">
      <div class="meta-row"><span class="lbl">أيام مسجّلة</span><span class="val gold">${totalDays}</span></div>
      <div class="meta-row"><span class="lbl">إيرادات اليوم</span>${revHTML}</div>
      <div class="meta-row"><span class="lbl">صافي اليوم</span>${netHTML}</div>
    </div>
    <div class="open-link">فتح الفرع ←</div>
  `;
  grid.appendChild(card);
});

// Stats bar
const data = allData();
const today = todayStr();
let totalDays=0, totalRev=0, activeToday=0;
BRANCHES.forEach(name=>{
  const keys=Object.keys(data).filter(k=>k.startsWith(name+'__'));
  totalDays+=keys.length;
  const tk=name+'__'+today;
  if(data[tk]){
    activeToday++;
    INCOME_IDS.forEach(id=>totalRev+=(data[tk][id]||0));
  }
});
document.getElementById('statDays').textContent    = totalDays;
document.getElementById('statRevenue').textContent = totalRev>0?fmt(totalRev)+' ر.س':'—';
document.getElementById('statActive').textContent  = activeToday+' / 12';
</script>
</body>
</html>
